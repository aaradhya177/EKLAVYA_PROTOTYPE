services:
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - models_data:/app/models
    depends_on:
      - postgres
      - minio
      - redis

  worker:
    build: .
    command: celery -A app.core.celery_app.celery_app worker --loglevel=info
    env_file: .env
    volumes:
      - models_data:/app/models
    depends_on:
      - postgres
      - minio
      - redis

  beat:
    build: .
    command: celery -A app.core.celery_app.celery_app beat --loglevel=info
    env_file: .env
    volumes:
      - models_data:/app/models
    depends_on:
      - postgres
      - minio
      - redis

  postgres:
    image: timescale/timescaledb-ha:pg16
    environment:
      POSTGRES_DB: athleteos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: athleteos
      MINIO_ROOT_PASSWORD: athleteos123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio_create_bucket:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set local http://minio:9000 athleteos athleteos123 &&
      /usr/bin/mc mb --ignore-existing local/athleteos
      "
    profiles:
      - "storage"

  flower:
    build: .
    command: celery -A app.core.celery_app.celery_app flower --port=5555
    env_file: .env
    ports:
      - "5555:5555"
    volumes:
      - models_data:/app/models
    depends_on:
      - redis

  celery-exporter:
    image: danihodovic/celery-exporter:latest
    environment:
      CE_BROKER_URL: redis://redis:6379/1
    ports:
      - "9540:9540"
    depends_on:
      - redis

  prometheus:
    image: prom/prometheus:latest
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./infra/monitoring/alerts.yml:/etc/prometheus/alerts.yml
    ports:
      - "9090:9090"
    depends_on:
      - api
      - celery-exporter

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./infra/monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards/json
    depends_on:
      - prometheus
      - loki

  loki:
    image: grafana/loki:latest
    command: -config.file=/etc/loki/config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./infra/monitoring/loki-config.yml:/etc/loki/config.yml

  promtail:
    image: grafana/promtail:latest
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./infra/monitoring/promtail.yml:/etc/promtail/config.yml
    depends_on:
      - loki

  alertmanager:
    image: prom/alertmanager:latest
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    volumes:
      - ./infra/monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    ports:
      - "9093:9093"

  backup:
    build: .
    command: /infra/backup/backup.sh
    env_file: .env
    profiles:
      - "backup"
    depends_on:
      - postgres
      - minio

  seed:
    build: .
    command: python -m app.seed.seed
    env_file: .env
    depends_on:
      - postgres
    profiles:
      - "seed"

volumes:
  models_data:
  minio_data:
  grafana_data:
