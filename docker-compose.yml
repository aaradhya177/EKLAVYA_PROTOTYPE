services:
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - models_data:/app/models
    depends_on:
      - postgres
      - minio
      - redis

  worker:
    build: .
    command: celery -A app.core.celery_app.celery_app worker --loglevel=info
    env_file: .env
    volumes:
      - models_data:/app/models
    depends_on:
      - postgres
      - minio
      - redis

  beat:
    build: .
    command: celery -A app.core.celery_app.celery_app beat --loglevel=info
    env_file: .env
    volumes:
      - models_data:/app/models
    depends_on:
      - postgres
      - minio
      - redis

  postgres:
    image: timescale/timescaledb-ha:pg16
    environment:
      POSTGRES_DB: athleteos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: athleteos
      MINIO_ROOT_PASSWORD: athleteos123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio_create_bucket:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set local http://minio:9000 athleteos athleteos123 &&
      /usr/bin/mc mb --ignore-existing local/athleteos
      "
    profiles:
      - "storage"

  flower:
    build: .
    command: celery -A app.core.celery_app.celery_app flower --port=5555
    env_file: .env
    ports:
      - "5555:5555"
    volumes:
      - models_data:/app/models
    depends_on:
      - redis

  seed:
    build: .
    command: python -m app.seed.seed
    env_file: .env
    depends_on:
      - postgres
    profiles:
      - "seed"

volumes:
  models_data:
  minio_data:
