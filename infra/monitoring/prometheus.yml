global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: athleteos-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - api:8000

  - job_name: celery-exporter
    static_configs:
      - targets:
          - celery-exporter:9540
