groups:
  - name: athleteos-alerts
    rules:
      - alert: APIHighErrorRate
        expr: |
          sum(rate(http_requests_total{status_code=~"5.."}[5m]))
          /
          clamp_min(sum(rate(http_requests_total[5m])), 1)
          > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: AthleteOS API error rate is above 5%

      - alert: APIHighLatency
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, endpoint)) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: AthleteOS API p95 latency is above 2 seconds

      - alert: CeleryQueueBacklog
        expr: celery_queue_length > 100
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Celery queue backlog is above 100 messages

      - alert: DatabaseConnectionsHigh
        expr: pg_stat_activity_count / clamp_min(pg_settings_max_connections, 1) > 0.8
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: Database connections are above 80 percent of max

      - alert: MLModelStaleness
        expr: increase(ml_model_predictions_total[24h]) == 0
        for: 24h
        labels:
          severity: warning
        annotations:
          summary: No ML model predictions observed in the last 24 hours

      - alert: DiskSpaceHigh
        expr: (node_filesystem_size_bytes - node_filesystem_avail_bytes) / clamp_min(node_filesystem_size_bytes, 1) > 0.8
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: Disk usage is above 80 percent
