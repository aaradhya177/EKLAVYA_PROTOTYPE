name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  PYTHON_VERSION: "3.12"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/athleteos
  DB_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/athleteos
  REDIS_URL: redis://127.0.0.1:6379/0
  CELERY_BROKER_URL: redis://127.0.0.1:6379/1
  CELERY_RESULT_BACKEND: redis://127.0.0.1:6379/2
  JWT_SECRET_KEY: ci-secret-key

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install lint tools
        run: python -m pip install --upgrade pip ruff black

      - name: Run ruff
        run: ruff check app/

      - name: Run black check
        run: black --check app/

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: timescale/timescaledb-ha:pg16
        env:
          POSTGRES_DB: athleteos
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d athleteos"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Wait for PostgreSQL
        run: |
          python - <<'PY'
          import socket
          import time

          for _ in range(12):
              try:
                  with socket.create_connection(("127.0.0.1", 5432), timeout=5):
                      raise SystemExit(0)
              except OSError:
                  time.sleep(5)
          raise SystemExit(1)
          PY

      - name: Wait for Redis
        run: |
          python - <<'PY'
          import socket
          import time

          for _ in range(12):
              try:
                  with socket.create_connection(("127.0.0.1", 6379), timeout=5):
                      raise SystemExit(0)
              except OSError:
                  time.sleep(5)
          raise SystemExit(1)
          PY

      - name: Run migrations
        run: alembic upgrade head

      - name: Seed database
        run: python -m app.seed.seed

      - name: Run tests with coverage
        run: pytest tests/ -v --cov=app --cov-report=xml --cov-fail-under=70

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: ${{ github.event.pull_request.head.repo.fork == false }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        run: |
          echo "image=${REGISTRY}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "tag=pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}

      - name: Push Docker image
        if: ${{ github.event.pull_request.head.repo.fork == false }}
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
