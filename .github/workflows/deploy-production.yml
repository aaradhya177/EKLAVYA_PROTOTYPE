name: Deploy Production

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/athleteos

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
      version_tag: ${{ steps.meta.outputs.version_tag }}
      changelog: ${{ steps.changelog.outputs.body }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare production tags
        id: meta
        run: |
          echo "image=${REGISTRY}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "version_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build and push production image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version_tag }}
            ${{ steps.meta.outputs.image }}:latest

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          previous_tag=$(git tag --sort=-creatordate | grep -Fxv "$GITHUB_REF_NAME" | head -n 1 || true)
          if [ -n "$previous_tag" ]; then
            notes=$(git log --pretty=format:'- %s (%h)' "${previous_tag}..${GITHUB_REF_NAME}")
          else
            notes=$(git log --pretty=format:'- %s (%h)')
          fi
          {
            echo "body<<EOF"
            if [ -n "$notes" ]; then
              echo "$notes"
            else
              echo "- No commit messages found for this release."
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: production
    steps:
      - name: Deploy to production host
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_URI: ${{ needs.build-and-push.outputs.image }}:${{ needs.build-and-push.outputs.version_tag }}
          RELEASE_VERSION: ${{ needs.build-and-push.outputs.version_tag }}
          PRODUCTION_APP_DIR: ${{ secrets.PRODUCTION_APP_DIR }}
          PRODUCTION_HEALTHCHECK_URL: ${{ secrets.PRODUCTION_HEALTHCHECK_URL }}
          PRODUCTION_BACKUP_S3_URI: ${{ secrets.PRODUCTION_BACKUP_S3_URI }}
          PRODUCTION_POSTGRES_USER: ${{ secrets.PRODUCTION_POSTGRES_USER }}
          PRODUCTION_POSTGRES_DB: ${{ secrets.PRODUCTION_POSTGRES_DB }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script_stop: true
          envs: IMAGE_URI,RELEASE_VERSION,PRODUCTION_APP_DIR,PRODUCTION_HEALTHCHECK_URL,PRODUCTION_BACKUP_S3_URI,PRODUCTION_POSTGRES_USER,PRODUCTION_POSTGRES_DB,GHCR_USERNAME,GHCR_TOKEN
          script: |
            set -e
            cd "$PRODUCTION_APP_DIR"
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            docker compose -f docker-compose.staging.yml up -d postgres
            backup_name="athleteos-${RELEASE_VERSION}-$(date +%Y%m%d%H%M%S).sql"
            docker compose -f docker-compose.staging.yml exec -T postgres pg_dump -U "$PRODUCTION_POSTGRES_USER" "$PRODUCTION_POSTGRES_DB" | aws s3 cp - "${PRODUCTION_BACKUP_S3_URI}/${backup_name}"
            docker pull "$IMAGE_URI"
            export ATHLETEOS_IMAGE="$IMAGE_URI"
            docker compose -f docker-compose.staging.yml up -d
            docker compose -f docker-compose.staging.yml exec -T api alembic upgrade head
            for attempt in 1 2 3 4 5; do
              status=$(curl -s -o /dev/null -w "%{http_code}" "$PRODUCTION_HEALTHCHECK_URL")
              if [ "$status" = "200" ]; then
                exit 0
              fi
              sleep 10
            done
            exit 1

      - name: Notify Slack on success
        if: success()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          CHANGELOG: ${{ needs.build-and-push.outputs.changelog }}
        run: |
          payload=$(jq -n \
            --arg version "${{ needs.build-and-push.outputs.version_tag }}" \
            --arg changelog "$CHANGELOG" \
            '{text: ("Production deploy succeeded for " + $version), blocks: [
              {type: "section", text: {type: "mrkdwn", text: ("*Production deployed:* `" + $version + "`")}},
              {type: "section", text: {type: "mrkdwn", text: ("*Changelog*\n" + $changelog)}}
            ]}')
          curl -X POST -H 'Content-type: application/json' --data "$payload" "$SLACK_WEBHOOK"

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          payload=$(jq -n \
            --arg version "${{ needs.build-and-push.outputs.version_tag }}" \
            '{text: ("Production deploy failed for " + $version)}')
          curl -X POST -H 'Content-type: application/json' --data "$payload" "$SLACK_WEBHOOK"
