name: Deploy Staging

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/athleteos

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image tag
        id: meta
        run: |
          echo "image=${REGISTRY}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "tag=staging-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push staging image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy to staging host
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_URI: ${{ needs.build-and-push.outputs.image }}:${{ needs.build-and-push.outputs.tag }}
          STAGING_APP_DIR: ${{ secrets.STAGING_APP_DIR }}
          STAGING_HEALTHCHECK_URL: ${{ secrets.STAGING_HEALTHCHECK_URL }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script_stop: true
          envs: IMAGE_URI,STAGING_APP_DIR,STAGING_HEALTHCHECK_URL,GHCR_USERNAME,GHCR_TOKEN
          script: |
            set -e
            cd "$STAGING_APP_DIR"
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            docker pull "$IMAGE_URI"
            export ATHLETEOS_IMAGE="$IMAGE_URI"
            docker compose -f docker-compose.staging.yml up -d
            docker compose -f docker-compose.staging.yml exec -T api alembic upgrade head
            for attempt in 1 2 3 4 5; do
              status=$(curl -s -o /dev/null -w "%{http_code}" "$STAGING_HEALTHCHECK_URL")
              if [ "$status" = "200" ]; then
                exit 0
              fi
              sleep 10
            done
            exit 1

      - name: Notify Slack on success
        if: success()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          payload=$(jq -n \
            --arg text "Staging deploy succeeded for `${{ github.repository }}` at commit `${{ github.sha }}` using image `${{ needs.build-and-push.outputs.tag }}`." \
            '{text: $text}')
          curl -X POST -H 'Content-type: application/json' --data "$payload" "$SLACK_WEBHOOK"

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          payload=$(jq -n \
            --arg text "Staging deploy failed for `${{ github.repository }}` at commit `${{ github.sha }}`." \
            '{text: $text}')
          curl -X POST -H 'Content-type: application/json' --data "$payload" "$SLACK_WEBHOOK"
